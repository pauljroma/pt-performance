## Objectives

objectives:
  primary:
    - Verify SQL migration was applied successfully in Supabase
    - Test timer creation and execution (no more RLS errors)
    - Test exercise logging with sets/reps (no more function errors)
    - Confirm all errors are resolved in production

  secondary:
    - Analyze any remaining errors in debug logs
    - Plan BUILD 144 improvements
    - Document complete resolution
    - Establish error monitoring baseline

## Agents

agents:
  - name: "Verification Coordinator"
    role: "Lead verification and testing coordination"
    responsibilities:
      - Guide user through SQL migration verification
      - Coordinate testing of timers and exercise logs
      - Collect and analyze test results
      - Identify any remaining issues
    tools:
      - Read Supabase logs
      - Parse user feedback
      - Update outcome documentation

  - name: "SQL Migration Validator"
    role: "Ensure database fixes are correctly applied"
    responsibilities:
      - Verify RLS policies exist and are correct
      - Verify calculate_rm_estimate functions work
      - Verify trigger is properly configured
      - Check backfill completed successfully
    tools:
      - verify_migration.sql script
      - Supabase SQL editor
      - PostgreSQL inspection queries
    success_criteria:
      - "4 RLS policies on workout_timers"
      - "2 calculate_rm_estimate function signatures"
      - "1 update_rm_estimate_trigger active"
      - "Function tests return expected values"

  - name: "Timer Functionality Tester"
    role: "Verify timer system works end-to-end"
    responsibilities:
      - Test timer creation (5 Minute AMRAP, custom timers)
      - Test timer start/stop/pause
      - Test timer completion and save to database
      - Verify no RLS policy violations
    tools:
      - BUILD 143 TestFlight app
      - Debug log viewer (shake device)
      - Supabase workout_timers table inspection
    test_cases:
      - "Create preset timer (5 Minute AMRAP)"
      - "Create custom timer with intervals"
      - "Start timer and let it run"
      - "Complete timer and verify save"
      - "Check debug logs for errors"

  - name: "Exercise Logging Tester"
    role: "Verify exercise save functionality"
    responsibilities:
      - Test exercise logging with multiple sets
      - Test RM estimate calculation
      - Verify saves to database
      - Verify no function errors
    tools:
      - BUILD 143 TestFlight app
      - Debug log viewer (shake device)
      - Supabase exercise_logs table inspection
    test_cases:
      - "Log exercise with single set (e.g., 100 lbs x 10 reps)"
      - "Log exercise with multiple sets (e.g., 100 lbs x [10,8,6] reps)"
      - "Verify RM estimate calculated correctly"
      - "Check debug logs for errors"
      - "Inspect database record"

  - name: "Error Log Analyzer"
    role: "Analyze debug logs for any remaining issues"
    responsibilities:
      - Review all error logs after testing
      - Categorize errors by severity
      - Identify patterns or new issues
      - Recommend fixes for BUILD 144
    tools:
      - Debug log viewer output
      - LoggingService UI
      - Error categorization framework
    analysis_criteria:
      - "Zero timer-related errors"
      - "Zero exercise save errors"
      - "Any new errors discovered"
      - "Error frequency and patterns"

  - name: "BUILD 144 Planner"
    role: "Plan improvements for next build"
    responsibilities:
      - Review lessons learned from BUILD 143
      - Identify user experience improvements
      - Plan error handling enhancements
      - Design error reporting infrastructure
    deliverables:
      - "BUILD_144_PLAN.md with prioritized improvements"
      - "User-friendly error message designs"
      - "Retry logic specifications"
      - "Error monitoring service evaluation (Sentry, etc.)"

## Workflow

workflow:
  phase_1_migration_verification:
    name: "Verify SQL Migration Applied"
    duration: "15 minutes"
    steps:
      - step: 1
        action: "User pastes verify_migration.sql into Supabase SQL editor"
        agent: "SQL Migration Validator"
        expected_output: "6 query results with all ✅ PASS statuses"

      - step: 2
        action: "Validate RLS policies count = 4"
        agent: "SQL Migration Validator"
        success: "pg_policies shows 4 policies on workout_timers"

      - step: 3
        action: "Validate functions count = 2"
        agent: "SQL Migration Validator"
        success: "pg_proc shows 2 calculate_rm_estimate signatures"

      - step: 4
        action: "Test function: calculate_rm_estimate(100, 10)"
        agent: "SQL Migration Validator"
        expected: "133.33"

      - step: 5
        action: "Test function: calculate_rm_estimate(100, ARRAY[10,8,6])"
        agent: "SQL Migration Validator"
        expected: "120.00"

      - step: 6
        action: "Document verification results"
        agent: "Verification Coordinator"
        output: "Update BUILD_143_ERROR_LOGGING_FIX_COMPLETE.md"

  phase_2_timer_testing:
    name: "Test Timer Functionality"
    duration: "20 minutes"
    steps:
      - step: 1
        action: "User opens BUILD 143 on TestFlight device"
        agent: "Timer Functionality Tester"

      - step: 2
        action: "Navigate to Timers tab"
        agent: "Timer Functionality Tester"

      - step: 3
        action: "Select '5 Minute AMRAP' preset"
        agent: "Timer Functionality Tester"

      - step: 4
        action: "Tap Start Timer"
        agent: "Timer Functionality Tester"
        expected: "Timer starts without errors"

      - step: 5
        action: "Let timer run for 10-15 seconds, then stop"
        agent: "Timer Functionality Tester"

      - step: 6
        action: "Shake device to open debug logs"
        agent: "Timer Functionality Tester"
        expected: "No [TIMER_START] errors visible"

      - step: 7
        action: "Check Supabase workout_timers table"
        agent: "Timer Functionality Tester"
        expected: "New timer record exists with patient_id"

      - step: 8
        action: "Document results"
        agent: "Verification Coordinator"
        on_success: "✅ Timers working - RLS fixed"
        on_failure: "❌ Still seeing errors - investigate"

  phase_3_exercise_testing:
    name: "Test Exercise Logging"
    duration: "20 minutes"
    steps:
      - step: 1
        action: "Navigate to Exercise Log section"
        agent: "Exercise Logging Tester"

      - step: 2
        action: "Select an exercise (e.g., Bench Press)"
        agent: "Exercise Logging Tester"

      - step: 3
        action: "Log 3 sets: 100 lbs x 10, 8, 6 reps"
        agent: "Exercise Logging Tester"

      - step: 4
        action: "Add RPE and pain scores"
        agent: "Exercise Logging Tester"

      - step: 5
        action: "Tap Save"
        agent: "Exercise Logging Tester"
        expected: "Exercise saved successfully"

      - step: 6
        action: "Shake device to check debug logs"
        agent: "Exercise Logging Tester"
        expected: "No calculate_rm_estimate errors"

      - step: 7
        action: "Check Supabase exercise_logs table"
        agent: "Exercise Logging Tester"
        expected: "New record with rm_estimate = 120.00"

      - step: 8
        action: "Document results"
        agent: "Verification Coordinator"
        on_success: "✅ Exercise saves working - Function fixed"
        on_failure: "❌ Still seeing errors - investigate"

  phase_4_error_analysis:
    name: "Analyze Remaining Errors"
    duration: "15 minutes"
    steps:
      - step: 1
        action: "User shares full debug log output"
        agent: "Error Log Analyzer"

      - step: 2
        action: "Categorize all errors by type"
        agent: "Error Log Analyzer"
        categories:
          - "Timer errors (should be 0)"
          - "Exercise save errors (should be 0)"
          - "New errors (investigate)"
          - "Warnings (low priority)"

      - step: 3
        action: "Calculate error frequencies"
        agent: "Error Log Analyzer"

      - step: 4
        action: "Identify root causes for any new errors"
        agent: "Error Log Analyzer"

      - step: 5
        action: "Document findings"
        agent: "Error Log Analyzer"
        output: "Error analysis report in outcome file"

  phase_5_build_144_planning:
    name: "Plan BUILD 144 Improvements"
    duration: "30 minutes"
    steps:
      - step: 1
        action: "Review BUILD 143 lessons learned"
        agent: "BUILD 144 Planner"
        reference: ".outcomes/BUILD_143_ERROR_LOGGING_FIX_COMPLETE.md"

      - step: 2
        action: "Collect user feedback on error visibility"
        agent: "BUILD 144 Planner"

      - step: 3
        action: "Design user-friendly error messages"
        agent: "BUILD 144 Planner"
        examples:
          - "Replace: 'new row violates RLS policy'"
          - "With: 'Unable to save timer. Please check your connection.'"

      - step: 4
        action: "Plan retry logic for failed operations"
        agent: "BUILD 144 Planner"
        areas:
          - "Timer start failures → Retry with exponential backoff"
          - "Exercise save failures → Retry with local cache"
          - "Network errors → Offline queue"

      - step: 5
        action: "Evaluate error reporting services"
        agent: "BUILD 144 Planner"
        options:
          - "Sentry (recommended for mobile)"
          - "Crashlytics (Firebase)"
          - "Custom solution with Supabase"

      - step: 6
        action: "Create BUILD_144_PLAN.md"
        agent: "BUILD 144 Planner"
        sections:
          - "Immediate fixes (any remaining errors)"
          - "UX improvements (friendly error messages)"
          - "Resilience improvements (retry logic)"
          - "Monitoring improvements (error service)"
          - "Testing improvements (automated error scenarios)"

      - step: 7
        action: "Prioritize improvements"
        agent: "BUILD 144 Planner"
        criteria:
          - "User impact (high = do first)"
          - "Implementation complexity (low = do first)"
          - "Risk level (low = do first)"

