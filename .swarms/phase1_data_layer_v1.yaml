name: "Phase 1: Data Layer - PT Performance Platform"
description: "Deploy Supabase data layer with schema, views, seed data, and validation"
created: "2025-12-06"
estimated_duration: "6-8 hours"
agents: 3

context:
  project: "PT Performance Platform MVP"
  platform: "Supabase + PostgreSQL"
  patient_profile: "John Brebbia (MLB pitcher, post-tricep strain)"
  safety_critical: true

success_criteria:
  - "All tables created in Supabase"
  - "Views execute without errors"
  - "Demo patient returns valid data"
  - "Data quality tests pass (0 issues)"
  - "1RM calculations match XLS ±2%"

agents:
  - id: "agent-1-schema"
    name: "Schema & Tables Agent"
    zones: ["zone-7", "zone-8"]
    tasks:
      - id: "ACP-83"
        title: "Validate and apply Supabase schema"
        description: "Load and deploy infra/*.sql files to Supabase"
        files:
          - "infra/001_init_supabase.sql"
          - "infra/002_epic_enhancements.sql"
        deliverables:
          - "All tables created in Supabase"
          - "Foreign keys validated"
          - "Timestamps configured"

      - id: "ACP-69"
        title: "Add CHECK constraints"
        description: "Add validation constraints for pain/RPE/velocity"
        constraints:
          - "pain_score >= 0 AND pain_score <= 10"
          - "rpe >= 0 AND rpe <= 10"
          - "velocity >= 40 AND velocity <= 110 (baseball)"
        deliverables:
          - "CHECK constraints added to all relevant tables"
          - "Invalid data rejected by database"

      - id: "ACP-79"
        title: "Build protocol schema"
        description: "Create protocol management tables"
        tables:
          - "protocol_templates"
          - "protocol_phases"
          - "protocol_constraints"
        deliverables:
          - "Protocol tables created"
          - "Sample protocols seeded (Tommy John, Rotator cuff, ACL)"

  - id: "agent-2-views"
    name: "Views & Analytics Agent"
    zones: ["zone-7", "zone-10b"]
    tasks:
      - id: "ACP-85"
        title: "Create analytics views"
        description: "Build core analytics views for patient metrics"
        views:
          - "vw_patient_adherence"
          - "vw_pain_trend"
          - "vw_throwing_workload"
        deliverables:
          - "All views created and tested"
          - "Performance <500ms"
          - "Documentation in DATA_DICTIONARY.md"

      - id: "ACP-64"
        title: "Implement throwing workload views"
        description: "Create throwing-specific analytics"
        reference: "docs/epics/EPIC_C_THROWING_ONRAMP_PLYO_MODEL.md"
        deliverables:
          - "vw_throwing_workload created"
          - "vw_onramp_progress created"
          - "Tested with demo data"

      - id: "ACP-70"
        title: "Create data quality view"
        description: "Build vw_data_quality_issues for validation"
        checks:
          - "Missing required fields"
          - "Invalid foreign keys"
          - "Out-of-range values"
          - "Orphaned records"
        deliverables:
          - "vw_data_quality_issues created"
          - "Returns actionable quality issues"

  - id: "agent-3-seed"
    name: "Seed & Test Agent"
    zones: ["zone-7", "zone-8", "zone-10b"]
    tasks:
      - id: "ACP-84"
        title: "Seed demo data"
        description: "Create therapist, patient, program, sessions"
        data:
          therapist:
            name: "Sarah Thompson"
            email: "demo-pt@ptperformance.app"
          patient:
            name: "John Brebbia"
            sport: "Baseball"
            position: "Pitcher"
            height: 73
            weight: 195
          program:
            name: "8-Week On-Ramp"
            phases: 4
            sessions_per_week: 3
        reference: "docs/PT_APP_DATA_MODEL_FROM_XLS.md"
        deliverables:
          - "Therapist record created"
          - "Patient record created with full profile"
          - "8-week program seeded"
          - "Sample exercise logs created"

      - id: "ACP-67"
        title: "Seed exercise library"
        description: "Populate exercise_templates with 50-100 exercises"
        categories:
          - "strength"
          - "plyo"
          - "mobility"
          - "bullpen"
        deliverables:
          - "50+ exercises seeded"
          - "All metadata populated"
          - "Includes XLS exercises"

      - id: "ACP-86"
        title: "Implement data quality tests"
        description: "Create validation tests and scripts"
        tests:
          - "1RM formula accuracy (Epley, Brzycki, Lombardi)"
          - "Pain interpretation logic"
          - "Foreign key integrity"
          - "Data completeness"
        reference: "docs/epics/EPIC_B_STRENGTH_SC_MODEL_FROM_XLS.md"
        deliverables:
          - "Unit tests created"
          - "All tests passing"
          - "Quality report: 0 issues"

coordination:
  communication: "Linear issue comments"
  status_updates: "Every 30 minutes"
  conflict_resolution: "Lower-numbered issue takes priority"

validation:
  sql_tests:
    - "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'"
    - "SELECT * FROM vw_patient_adherence LIMIT 5"
    - "SELECT * FROM vw_pain_trend LIMIT 5"
    - "SELECT * FROM vw_data_quality_issues"

  expected_results:
    tables: ">= 20 tables"
    views: ">= 5 views"
    demo_patient: "John Brebbia record exists"
    quality_issues: "0 rows"

handoff:
  document: ".outcomes/phase1_handoff.md"
  includes:
    - "Completion summary"
    - "Supabase dashboard screenshots"
    - "Test results"
    - "Quality metrics"
    - "Phase 2 readiness checklist"
