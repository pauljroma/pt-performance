name: "Phase 2: Backend Intelligence - PT Performance Platform"
description: "Build intelligent backend service with PT assistant, risk engine, and Linear integration"
created: "2025-12-06"
estimated_duration: "6-8 hours"
agents: 3

context:
  project: "PT Performance Platform MVP"
  platform: "Node.js + Supabase + Linear API"
  patient_profile: "John Brebbia (MLB pitcher, post-tricep strain)"
  safety_critical: true
  dependencies: "Phase 1 complete (schema deployed, demo data seeded)"

success_criteria:
  - "All endpoints return valid responses for demo patient (John Brebbia)"
  - "Flag engine identifies pain/velocity/adherence issues correctly"
  - "HIGH flags auto-create Linear issues (zone-4b, In Review state)"
  - "PT assistant summaries are accurate and safe"
  - "Test harness validates assistant behavior"
  - "All 12 issues marked Done in Linear"

agents:
  - id: "agent-1-backend"
    name: "Core Backend Service Agent"
    zones: ["zone-3c", "zone-8", "zone-12"]
    tasks:
      - id: "ACP-87"
        title: "Create agent backend skeleton"
        description: "Express + health endpoint + Supabase connection"
        deliverables:
          - "Express server running on port 3000"
          - "GET /health returns 200"
          - "Environment variables configured (.env)"
          - "Supabase client initialized"
        files_to_create:
          - "agent-service/src/server.js"
          - "agent-service/src/config.js"
          - "agent-service/package.json"

      - id: "ACP-88"
        title: "Implement Supabase query endpoints"
        description: "Build /patient-summary and /today-session"
        reference: "docs/runbooks/RUNBOOK_AGENT_BACKEND.md"
        endpoints:
          - "GET /patient-summary/:patientId"
          - "GET /today-session/:patientId"
        deliverables:
          - "/patient-summary returns profile + recent logs + pain trend"
          - "/today-session returns exercises for today's session"
          - "Both endpoints tested with John Brebbia (demo patient)"
        files_to_create:
          - "agent-service/src/routes/patient.js"
          - "agent-service/src/services/supabase.js"

      - id: "ACP-89"
        title: "Implement PT Assistant summaries endpoint"
        description: "Generate intelligent summaries from patient data"
        reference: "docs/epics/EPIC_J_PT_ASSISTANT_AGENT_SPEC.md"
        endpoints:
          - "GET /pt-assistant/summary/:patientId"
        deliverables:
          - "Generates pain trend summary"
          - "Generates adherence summary"
          - "Generates strength signals"
          - "Generates velocity signals (if pitcher)"
          - "Text is accurate, concise, safe"
        files_to_create:
          - "agent-service/src/routes/pt-assistant.js"
          - "agent-service/src/services/assistant.js"

      - id: "ACP-60"
        title: "Build getStrengthTargets() endpoint"
        description: "Calculate strength targets based on 1RM and progression"
        reference: "docs/epics/EPIC_B_STRENGTH_SC_MODEL_FROM_XLS.md"
        endpoints:
          - "GET /strength-targets/:patientId"
        deliverables:
          - "Returns calculated 1RM estimates"
          - "Returns progressive targets by week"
          - "Uses Epley/Brzycki formulas correctly"
        files_to_create:
          - "agent-service/src/services/strength.js"

  - id: "agent-2-flags"
    name: "Risk Engine & Flags Agent"
    zones: ["zone-3c", "zone-4b", "zone-7", "zone-10b"]
    tasks:
      - id: "ACP-100"
        title: "Build flag computation logic"
        description: "Implement computeFlags() function"
        reference: "docs/runbooks/RUNBOOK_FLAGS_RISK_ENGINE.md"
        flag_types:
          - "Pain > 5 (immediate)"
          - "Pain 3-5 for 2+ sessions"
          - "Pain increasing > 2 points"
          - "Velocity drop > 3 mph"
          - "Velocity drop > 5 mph (critical)"
          - "Command decline > 20%"
          - "Adherence < 60% over 7 days"
        deliverables:
          - "computeFlags(patientId) function"
          - "Returns [{flag_type, severity, rationale}]"
          - "Handles missing data gracefully"
        files_to_create:
          - "agent-service/src/services/flags.js"
          - "agent-service/src/utils/flag-rules.js"

      - id: "ACP-101"
        title: "Attach flags to summary endpoints"
        description: "Add flag data to patient-summary and pt-assistant/summary"
        deliverables:
          - "/patient-summary includes flag count + top 3 flags"
          - "/pt-assistant/summary includes flag analysis"
          - "Summaries match flag logic exactly"
        files_to_modify:
          - "agent-service/src/routes/patient.js"
          - "agent-service/src/routes/pt-assistant.js"

      - id: "ACP-102"
        title: "Auto-create Plan Change Requests"
        description: "Create Linear issues for HIGH severity flags"
        deliverables:
          - "HIGH flags trigger Linear issue creation"
          - "Issues tagged with zone-4b"
          - "Issues set to 'In Review' state"
          - "Issues include patient_id, trigger_metric, rationale"
        files_to_create:
          - "agent-service/src/services/linear-pcr.js"

      - id: "ACP-66"
        title: "Create throwing flag generators"
        description: "Specialized flag logic for throwing metrics"
        reference: "docs/epics/EPIC_C_THROWING_ONRAMP_PLYO_MODEL.md"
        deliverables:
          - "Velocity drop detection"
          - "Command % tracking"
          - "Workload trend analysis"
          - "Auto PCR creation for throwing issues"
        files_to_modify:
          - "agent-service/src/utils/flag-rules.js"

  - id: "agent-3-testing"
    name: "Testing & Observability Agent"
    zones: ["zone-3c", "zone-10b", "zone-13"]
    tasks:
      - id: "ACP-90"
        title: "Implement Plan Change Request creation endpoint"
        description: "Manual PCR creation endpoint"
        endpoints:
          - "POST /pt-assistant/plan-change-proposal/:patientId"
        deliverables:
          - "Accepts: {reason, suggested_changes, severity}"
          - "Creates Linear issue with proper formatting"
          - "Returns issue ID and URL"
        files_to_create:
          - "agent-service/src/routes/pcr.js"

      - id: "ACP-72"
        title: "Add PT assistant behavior tests"
        description: "Test harness for PT assistant prompts and logic"
        reference: "docs/epics/EPIC_J_PT_ASSISTANT_AGENT_SPEC.md"
        test_scenarios:
          - "Pain > 5 triggers correct recommendation"
          - "Velocity drop detected accurately"
          - "Adherence < 60% flagged"
          - "Summaries are safe (no harm advice)"
        deliverables:
          - "Test suite created (Jest or Mocha)"
          - "All scenarios passing"
          - "Test coverage > 80%"
        files_to_create:
          - "agent-service/tests/assistant.test.js"
          - "agent-service/tests/fixtures/demo-patient-data.json"

      - id: "ACP-81"
        title: "Add protocol validation"
        description: "Check protocol before suggesting changes"
        reference: "infra/003_agent1_constraints_and_protocols.sql"
        deliverables:
          - "Query protocol_constraints before recommendations"
          - "Validate suggestions against protocol rules"
          - "Block unsafe recommendations"
        files_to_create:
          - "agent-service/src/services/protocol-validator.js"

      - id: "ACP-74"
        title: "Add logging to endpoints"
        description: "Write to agent_logs table"
        deliverables:
          - "All endpoints log to agent_logs table"
          - "Log includes: timestamp, endpoint, patient_id, response_time"
          - "Error logging with stack traces"
        files_to_create:
          - "agent-service/src/middleware/logging.js"

coordination:
  communication: "Linear issue comments"
  status_updates: "Every 30-60 minutes"
  conflict_resolution: "Lower-numbered issue takes priority"
  shared_files:
    - "agent-service/.env (shared config)"
    - "agent-service/src/config.js (shared constants)"

validation:
  endpoint_tests:
    - "curl http://localhost:3000/health"
    - "curl http://localhost:3000/patient-summary/{demo_patient_id}"
    - "curl http://localhost:3000/today-session/{demo_patient_id}"
    - "curl http://localhost:3000/pt-assistant/summary/{demo_patient_id}"
    - "curl http://localhost:3000/strength-targets/{demo_patient_id}"

  flag_tests:
    - "computeFlags(demo_patient) returns expected flags"
    - "HIGH severity flag creates Linear issue"
    - "Linear issue has zone-4b label and In Review state"

  test_suite:
    - "npm test (all tests passing)"
    - "Test coverage > 80%"

  expected_results:
    endpoints: "5 working endpoints"
    flags: "Flag engine detects all scenarios"
    linear_integration: "PCRs auto-created successfully"
    tests: "All behavior tests passing"

handoff:
  document: ".outcomes/phase2_handoff.md"
  includes:
    - "Completion summary"
    - "API endpoint documentation"
    - "Test results"
    - "Flag engine validation"
    - "Linear PCR examples"
    - "Phase 3 readiness checklist"

runbooks:
  - "docs/runbooks/RUNBOOK_AGENT_BACKEND.md"
  - "docs/runbooks/RUNBOOK_FLAGS_RISK_ENGINE.md"

epics:
  - "docs/epics/EPIC_J_PT_ASSISTANT_AGENT_SPEC.md"
  - "docs/epics/EPIC_G_PAIN_INTERPRETATION_MODEL.md"
  - "docs/epics/EPIC_C_THROWING_ONRAMP_PLYO_MODEL.md"
  - "docs/epics/EPIC_B_STRENGTH_SC_MODEL_FROM_XLS.md"
