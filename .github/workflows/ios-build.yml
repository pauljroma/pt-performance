  name: Build iOS App                                                                                                                                                                                              
                                                                                                                                                                                                                   
  on:                                                                                                                                                                                                              
    push:                                                                                                                                                                                                          
      branches: [main, develop]                                                                                                                                                                                    
    workflow_dispatch:

  jobs:
    build:
      runs-on: macos-14

      steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Show Build Info
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift Packages
        run: |
          cd ios-app/PTPerformance
          xcodebuild -resolvePackageDependencies -project PTPerformance.xcodeproj -scheme PTPerformance

      - name: Build for Simulator
        run: |
          cd ios-app/PTPerformance
          xcodebuild build -project PTPerformance.xcodeproj -scheme PTPerformance -sdk iphonesimulator -configuration Debug

      - name: Build for Device
        if: github.ref == 'refs/heads/main'
        run: |
          cd ios-app/PTPerformance
          xcodebuild build -project PTPerformance.xcodeproj -scheme PTPerformance -sdk iphoneos -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        if: github.ref == 'refs/heads/main'
        run: |
          cd ios-app/PTPerformance
          mkdir -p Payload
          cp -r build/Release-iphoneos/PTPerformance.app Payload/
          zip -r PTPerformance.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: PTPerformance-IPA
          path: ios-app/PTPerformance/PTPerformance.ipa
          retention-days: 30
