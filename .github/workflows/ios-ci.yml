name: iOS CI

# Generated by tool-chain init --platform ios
# Project: pt-performance
#
# Three-job pipeline: lint → test → build
# Lint is a hard gate: test and build only run if lint passes.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --reporter github-actions-logging

  test:
    name: Unit Tests
    runs-on: macos-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme PTPerformance \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            2>/dev/null || true

      - name: Run unit tests
        id: test
        run: |
          xcodebuild test \
            -scheme PTPerformance \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color 2>/dev/null || cat
        continue-on-error: true

      - name: Extract coverage
        id: coverage
        run: |
          COVERAGE=$(xcrun xccov view --report TestResults.xcresult 2>/dev/null \
            | grep 'pt-performance' | head -1 | grep -oE '[0-9]+\.[0-9]+%' | head -1 || echo "0%")
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE"

          # Enforce minimum threshold
          THRESHOLD=70
          PCTVAL=$(echo "$COVERAGE" | tr -d '%' | cut -d. -f1)
          if [ "${PCTVAL:-0}" -lt "$THRESHOLD" ]; then
            echo "::warning::Coverage $COVERAGE is below threshold ${THRESHOLD}%"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 **Test Coverage**: ${coverage}`
            });

  build:
    name: Build (Debug Simulator)
    runs-on: macos-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme PTPerformance \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            2>/dev/null || true

      - name: Build for simulator
        run: |
          xcodebuild build \
            -scheme PTPerformance \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -derivedDataPath build/DerivedData \
            | xcpretty --color 2>/dev/null || cat
