name: Deploy to TestFlight

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'ios-app/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios-app/PTPerformance

      - name: Install dependencies
        run: |
          cd ios-app/PTPerformance
          bundle install

      - name: Deploy to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
        run: |
          cd ios-app/PTPerformance
          bundle exec fastlane beta

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-logs
          path: |
            ios-app/PTPerformance/fastlane/report.xml
            ios-app/PTPerformance/fastlane/test_output

      - name: Upload IPA on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PTPerformance-IPA
          path: ios-app/PTPerformance/*.ipa
          retention-days: 30
