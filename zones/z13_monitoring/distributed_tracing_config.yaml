# Distributed Tracing Configuration - Wave 2 Agent 13
# Jaeger-based distributed tracing for end-to-end request tracking
#
# Agent 13: Advanced Monitoring Engineer
# Date: 2025-12-06
# Purpose: Enable distributed tracing for Wave 2 performance optimization

version: "1.0"
tracing_system: jaeger

# Jaeger Configuration
jaeger:
  enabled: true
  agent_host: localhost
  agent_port: 6831
  collector_endpoint: "http://localhost:14268/api/traces"
  sampler:
    type: "probabilistic"  # constant, probabilistic, ratelimiting, remote
    param: 0.1  # 10% sampling rate (adjust based on traffic volume)

  # Reporter settings
  reporter:
    log_spans: false
    max_queue_size: 100
    flush_interval_ms: 1000

# Service Configuration
service:
  name: "sapphire-wave2"
  version: "2.0"
  environment: "production"  # development, staging, production

# Component Tracing
components:
  rust_primitives:
    enabled: true
    trace_all_queries: false  # Only trace sampled queries
    trace_slow_queries: true
    slow_query_threshold_ms: 50
    attributes:
      - query_type
      - query_latency_ms
      - cache_hit
      - pool_size
      - connection_id

  tier_router:
    enabled: true
    trace_routing_decisions: true
    trace_failover_events: true
    attributes:
      - selected_tier
      - routing_overhead_ms
      - tier_health_status
      - failover_count
      - query_characteristics

  ml_tier_selector:
    enabled: true
    trace_ml_predictions: true
    trace_model_performance: true
    attributes:
      - predicted_tier
      - confidence_score
      - inference_time_ms
      - feature_values
      - fallback_to_static

  database_tiers:
    master:
      enabled: true
      trace_level: "sampled"  # all, sampled, errors_only
    pgvector:
      enabled: true
      trace_level: "sampled"
    minio:
      enabled: true
      trace_level: "sampled"
    athena:
      enabled: true
      trace_level: "all"  # Athena is slower, trace everything

# Span Tags (for filtering and analysis)
default_tags:
  deployment: "wave2"
  tier_routing: "enabled"
  rust_optimization: "enabled"
  ml_routing: "enabled"

# Baggage Propagation (cross-service context)
baggage:
  - user_id
  - session_id
  - request_id
  - client_version
  - feature_flags

# Performance Settings
performance:
  max_tag_value_length: 256
  max_logs_per_span: 10
  disable_tracing_on_high_load: true
  high_load_threshold_qps: 5000

# Integration with existing monitoring
integration:
  prometheus:
    enabled: true
    export_trace_metrics: true
    metrics:
      - trace_duration_seconds
      - trace_span_count
      - trace_error_count

  grafana:
    enabled: true
    datasource_name: "jaeger-wave2"

  alertmanager:
    enabled: true
    alert_on_high_error_rate: true
    error_rate_threshold: 0.05  # 5%
    alert_on_high_latency: true
    latency_p99_threshold_ms: 100

# Trace Retention
retention:
  max_traces: 100000
  retention_period_hours: 168  # 7 days
  cleanup_interval_hours: 24

# Security & Privacy
security:
  redact_sensitive_data: true
  sensitive_fields:
    - password
    - api_key
    - secret
    - token
    - credential

  # Don't trace PII
  exclude_tags:
    - email
    - phone_number
    - ssn

# Sampling Strategy
sampling:
  # Always trace
  always_trace:
    - error_queries  # Any query with errors
    - slow_queries   # Queries exceeding threshold
    - failover_events  # Tier failover events

  # Never trace
  never_trace:
    - health_checks
    - metrics_polling

  # Special cases
  high_value_queries:
    sample_rate: 1.0  # 100% for important queries
    patterns:
      - "/api/v2/drug/resolve/*"
      - "/api/v2/pathway/*"

# Trace Analysis
analysis:
  # Critical path analysis
  critical_paths:
    - name: "drug_resolution_path"
      entry_point: "resolve_drug"
      exit_point: "return_drug_data"

    - name: "tier_routing_path"
      entry_point: "route_query"
      exit_point: "tier_selected"

    - name: "ml_prediction_path"
      entry_point: "predict_tier"
      exit_point: "prediction_complete"

  # Latency SLOs
  slo_targets:
    - path: "drug_resolution_path"
      p50_ms: 30
      p95_ms: 60
      p99_ms: 100

    - path: "tier_routing_path"
      p50_ms: 0.001
      p95_ms: 0.005
      p99_ms: 0.01

    - path: "ml_prediction_path"
      p50_ms: 0.5
      p95_ms: 1.0
      p99_ms: 2.0

# Dashboards
dashboards:
  - name: "Wave 2 Distributed Tracing"
    panels:
      - Service dependency map
      - Request rate by component
      - Latency distribution by component
      - Error rate by component
      - Trace timeline view
      - Critical path analysis
      - SLO compliance

# Export Configuration
export:
  formats:
    - jaeger_json
    - zipkin_json
    - otlp  # OpenTelemetry Protocol

  destinations:
    - type: "jaeger_collector"
      endpoint: "http://localhost:14268/api/traces"

    - type: "s3"
      bucket: "sapphire-traces"
      prefix: "wave2/"
      enabled: false  # Enable for long-term storage

    - type: "elasticsearch"
      endpoint: "http://localhost:9200"
      index: "sapphire-traces"
      enabled: false

# Troubleshooting
troubleshooting:
  debug_mode: false
  verbose_logging: false
  trace_internal_operations: false

# Feature Flags
feature_flags:
  enable_distributed_tracing: true
  enable_trace_sampling: true
  enable_baggage_propagation: true
  enable_slo_monitoring: true
