# Wave 1 Foundation Alert Rules
# Based on Agent 6 performance benchmarks and targets
# Reference: AGENT6_WAVE1_PERFORMANCE_COMPLETION_REPORT.md

groups:
  - name: wave1_rust_primitives
    interval: 30s
    rules:
      # Critical Alerts
      - alert: RustPrimitivesHighLatency
        expr: histogram_quantile(0.95, rate(rust_primitives_latency_bucket[5m])) > 0.1
        for: 2m
        labels:
          severity: critical
          component: rust_primitives
          wave: wave1
        annotations:
          summary: "Rust primitives P95 latency exceeded target"
          description: "P95 latency is {{ $value | humanizeDuration }}, exceeding 0.1ms target (baseline: 0.082ms)"
          runbook: "https://docs.internal/runbooks/wave1/rust-high-latency"
          action: "Check Rust service health, connection pool status, and database performance"

      - alert: RustPrimitivesFallbackStorm
        expr: (rate(rust_primitives_fallback_total[5m]) / rate(rust_primitives_requests_total[5m])) * 100 > 1
        for: 3m
        labels:
          severity: critical
          component: rust_primitives
          wave: wave1
        annotations:
          summary: "Rust fallback rate exceeded 1% threshold"
          description: "Fallback rate is {{ $value | humanizePercentage }}, indicating Rust service unavailability"
          runbook: "https://docs.internal/runbooks/wave1/rust-fallback-storm"
          action: "Investigate Rust service availability, check connection pool exhaustion, verify database connectivity"

      - alert: RustPrimitivesErrors
        expr: rate(rust_primitives_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          component: rust_primitives
          wave: wave1
        annotations:
          summary: "Rust primitives generating errors"
          description: "Error rate: {{ $value | humanize }} errors/sec"
          runbook: "https://docs.internal/runbooks/wave1/rust-errors"
          action: "Check logs for error details, investigate database connectivity, verify query validity"

      # Warning Alerts
      - alert: RustPrimitivesFallbackRateWarning
        expr: (rate(rust_primitives_fallback_total[5m]) / rate(rust_primitives_requests_total[5m])) * 100 > 0.5
        for: 5m
        labels:
          severity: warning
          component: rust_primitives
          wave: wave1
        annotations:
          summary: "Rust fallback rate elevated (>0.5%)"
          description: "Fallback rate: {{ $value | humanizePercentage }} (warning threshold: 0.5%)"
          runbook: "https://docs.internal/runbooks/wave1/rust-fallback-warning"
          action: "Monitor for escalation, check Rust service health metrics"

      - alert: RustCacheHitRateLow
        expr: (rate(rust_primitives_cache_hits[5m]) / (rate(rust_primitives_cache_hits[5m]) + rate(rust_primitives_cache_misses[5m]))) * 100 < 50
        for: 5m
        labels:
          severity: warning
          component: rust_primitives
          wave: wave1
        annotations:
          summary: "Cache hit rate below target (50%)"
          description: "Hit rate: {{ $value | humanizePercentage }} (baseline: 72%, target: 50%+)"
          runbook: "https://docs.internal/runbooks/wave1/cache-hit-rate-low"
          action: "Review cache size, TTL settings, and query patterns. Consider increasing cache size."

      - alert: RustCacheHitRateCritical
        expr: (rate(rust_primitives_cache_hits[5m]) / (rate(rust_primitives_cache_hits[5m]) + rate(rust_primitives_cache_misses[5m]))) * 100 < 40
        for: 5m
        labels:
          severity: critical
          component: rust_primitives
          wave: wave1
        annotations:
          summary: "Cache hit rate critically low (<40%)"
          description: "Hit rate: {{ $value | humanizePercentage }} - significant performance degradation expected"
          runbook: "https://docs.internal/runbooks/wave1/cache-hit-rate-critical"
          action: "Immediate investigation required. Check for cache invalidation issues, TTL problems, or query pattern changes."

  - name: wave1_tier_router
    interval: 30s
    rules:
      # Critical Alerts
      - alert: TierRouterHighOverhead
        expr: histogram_quantile(0.95, rate(tier_router_overhead_bucket[5m])) > 1
        for: 3m
        labels:
          severity: critical
          component: tier_router
          wave: wave1
        annotations:
          summary: "Tier router overhead exceeded 1ms threshold"
          description: "P95 overhead: {{ $value | humanizeDuration }} (baseline: 0.55ms, target: <1ms)"
          runbook: "https://docs.internal/runbooks/wave1/router-high-overhead"
          action: "Review routing logic performance, check tier selection speed, investigate query classification overhead"

      - alert: TierRouterOverheadWarning
        expr: histogram_quantile(0.95, rate(tier_router_overhead_bucket[5m])) > 0.6
        for: 5m
        labels:
          severity: warning
          component: tier_router
          wave: wave1
        annotations:
          summary: "Tier router overhead elevated (>0.6ms)"
          description: "P95 overhead: {{ $value | humanizeDuration }} (baseline: 0.55ms, warning: 0.6ms)"
          runbook: "https://docs.internal/runbooks/wave1/router-overhead-warning"
          action: "Monitor for escalation, review recent routing logic changes"

      - alert: TierRouterFallbackRate
        expr: (rate(tier_router_fallback_total[5m]) / rate(tier_router_requests_total[5m])) * 100 > 1
        for: 3m
        labels:
          severity: critical
          component: tier_router
          wave: wave1
        annotations:
          summary: "Tier router fallback rate exceeded 1%"
          description: "Fallback rate: {{ $value | humanizePercentage }} - routing logic failing"
          runbook: "https://docs.internal/runbooks/wave1/router-fallback-rate"
          action: "Investigate routing logic errors, check tier availability, verify configuration"

      - alert: TierRouterLowRoutingPercentage
        expr: (sum(rate(tier_router_queries_by_tier{tier!="master_tables"}[5m])) / sum(rate(tier_router_queries_by_tier[5m]))) * 100 < 30
        for: 10m
        labels:
          severity: warning
          component: tier_router
          wave: wave1
        annotations:
          summary: "Non-master routing percentage below target"
          description: "Routing percentage: {{ $value | humanizePercentage }} (baseline: 42%, target: 30%+)"
          runbook: "https://docs.internal/runbooks/wave1/low-routing-percentage"
          action: "Review query patterns, check tier selection logic, investigate tier availability"

      - alert: TierRouterClassificationSlow
        expr: histogram_quantile(0.95, rate(tier_router_classification_duration_bucket[5m])) > 0.25
        for: 5m
        labels:
          severity: warning
          component: tier_router
          wave: wave1
        annotations:
          summary: "Query classification taking too long"
          description: "P95 classification time: {{ $value | humanizeDuration }} (baseline: 0.23ms, threshold: 0.25ms)"
          runbook: "https://docs.internal/runbooks/wave1/classification-slow"
          action: "Review classification logic, check for regex performance issues"

  - name: wave1_system_performance
    interval: 30s
    rules:
      # Critical Alerts
      - alert: Wave1HighEndToEndLatency
        expr: histogram_quantile(0.95, rate(wave1_end_to_end_latency_bucket[5m])) > 2
        for: 3m
        labels:
          severity: critical
          component: system
          wave: wave1
        annotations:
          summary: "End-to-end P95 latency exceeded 2ms target"
          description: "P95 latency: {{ $value | humanizeDuration }} (baseline: 0.85ms, target: <2ms)"
          runbook: "https://docs.internal/runbooks/wave1/high-latency"
          action: "Check all Wave 1 components (Rust, Router), database performance, network latency"

      - alert: Wave1CriticalEndToEndLatency
        expr: histogram_quantile(0.95, rate(wave1_end_to_end_latency_bucket[5m])) > 5
        for: 2m
        labels:
          severity: critical
          component: system
          wave: wave1
        annotations:
          summary: "End-to-end latency critically high (>5ms)"
          description: "P95 latency: {{ $value | humanizeDuration }} - severe performance degradation"
          runbook: "https://docs.internal/runbooks/wave1/critical-latency"
          action: "IMMEDIATE ACTION REQUIRED: Check system health, consider rollback to baseline"

      - alert: Wave1HighErrorRate
        expr: (rate(wave1_errors_total[5m]) / rate(wave1_queries_total[5m])) * 100 > 1
        for: 2m
        labels:
          severity: critical
          component: system
          wave: wave1
        annotations:
          summary: "Error rate exceeded 1% threshold"
          description: "Error rate: {{ $value | humanizePercentage }} (target: 0%)"
          runbook: "https://docs.internal/runbooks/wave1/high-error-rate"
          action: "Investigate error logs, check component health, verify database connectivity"

      - alert: Wave1ErrorRateWarning
        expr: (rate(wave1_errors_total[5m]) / rate(wave1_queries_total[5m])) * 100 > 0.1
        for: 5m
        labels:
          severity: warning
          component: system
          wave: wave1
        annotations:
          summary: "Error rate elevated (>0.1%)"
          description: "Error rate: {{ $value | humanizePercentage }} (warning threshold: 0.1%)"
          runbook: "https://docs.internal/runbooks/wave1/error-rate-warning"
          action: "Monitor for escalation, review error patterns"

      - alert: Wave1LowThroughput
        expr: rate(wave1_queries_total[5m]) * 60 < 30000
        for: 5m
        labels:
          severity: warning
          component: system
          wave: wave1
        annotations:
          summary: "Query throughput below expected levels"
          description: "Throughput: {{ $value | humanize }} queries/min (baseline: 51,000 qpm)"
          runbook: "https://docs.internal/runbooks/wave1/low-throughput"
          action: "Check for traffic drops, investigate performance bottlenecks"

      - alert: Wave1HighMemoryUsage
        expr: process_resident_memory_bytes{job="wave1"} > 524288000
        for: 10m
        labels:
          severity: critical
          component: system
          wave: wave1
        annotations:
          summary: "Memory usage exceeded 500MB"
          description: "Memory: {{ $value | humanizeBytes }} (baseline: <300MB for peak load)"
          runbook: "https://docs.internal/runbooks/wave1/high-memory"
          action: "Investigate memory leak, check cache sizes, review connection pool usage"

      - alert: Wave1MemoryUsageWarning
        expr: process_resident_memory_bytes{job="wave1"} > 314572800
        for: 15m
        labels:
          severity: warning
          component: system
          wave: wave1
        annotations:
          summary: "Memory usage elevated (>300MB)"
          description: "Memory: {{ $value | humanizeBytes }} (baseline peak: 300MB)"
          runbook: "https://docs.internal/runbooks/wave1/memory-warning"
          action: "Monitor for escalation, check for gradual memory growth"

  - name: wave1_availability
    interval: 30s
    rules:
      - alert: Wave1ComponentDown
        expr: up{job="wave1"} == 0
        for: 1m
        labels:
          severity: critical
          component: availability
          wave: wave1
        annotations:
          summary: "Wave 1 component is down"
          description: "Component {{ $labels.instance }} is not responding"
          runbook: "https://docs.internal/runbooks/wave1/component-down"
          action: "IMMEDIATE: Check service status, restart if needed, verify dependencies"

      - alert: Wave1HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="wave1"}[5m]) * 100 > 95
        for: 5m
        labels:
          severity: critical
          component: availability
          wave: wave1
        annotations:
          summary: "CPU usage critically high"
          description: "CPU usage: {{ $value | humanizePercentage }}"
          runbook: "https://docs.internal/runbooks/wave1/high-cpu"
          action: "Check for runaway processes, query hotspots, consider scaling"

      - alert: Wave1DatabaseConnectionPoolExhaustion
        expr: rust_primitives_connection_pool_active / rust_primitives_connection_pool_max > 0.9
        for: 5m
        labels:
          severity: warning
          component: availability
          wave: wave1
        annotations:
          summary: "Connection pool nearly exhausted"
          description: "Pool usage: {{ $value | humanizePercentage }} ({{ $labels.active }}/{{ $labels.max }})"
          runbook: "https://docs.internal/runbooks/wave1/connection-pool-exhaustion"
          action: "Consider increasing pool size, investigate connection leaks, check query duration"

# Alert Metadata
# These values define the baseline expectations from Agent 6 benchmarks
metadata:
  performance_baselines:
    rust_primitives:
      latency_p50: "0.062ms"
      latency_p95: "0.082ms"
      latency_p99: "0.089ms"
      fallback_rate: "<0.1%"
      cache_hit_rate: "72%"
      speedup_vs_python: "8x"

    tier_router:
      overhead_p50: "0.40ms"
      overhead_p95: "0.55ms"
      overhead_p99: "0.60ms"
      routing_percentage: "42%"
      classification_p95: "0.23ms"
      fallback_rate: "<0.1%"

    end_to_end:
      latency_p50: "0.605ms"
      latency_p95: "0.850ms"
      latency_p99: "0.920ms"
      throughput: "51,000 qpm (850 qps)"
      memory_10k_queries: "45MB"
      error_rate: "0%"

  alert_thresholds:
    rust_latency:
      warning: "0.1ms"  # Target threshold
      critical: "0.15ms"  # 50% over target

    rust_fallback:
      warning: "0.5%"
      critical: "1%"

    router_overhead:
      warning: "0.6ms"
      critical: "1ms"

    end_to_end_latency:
      warning: "2ms"
      critical: "5ms"

    error_rate:
      warning: "0.1%"
      critical: "1%"

    cache_hit_rate:
      warning: "60%"  # 12% below baseline
      critical: "50%"  # Target minimum

    throughput:
      warning: "30,000 qpm"  # 41% below baseline

    memory:
      warning: "300MB"  # Peak load baseline
      critical: "500MB"  # Safety limit
