# Tier Router Configuration
# Defines routing rules for optimal database tier selection
#
# Tier Hierarchy (fastest to slowest):
#   1. master_tables  - <2ms (Rust primitives) or <0.5ms (Python SQL)
#   2. pgvector       - ~5-50ms (embedding operations)
#   3. neo4j          - ~50-500ms (graph traversal)
#   4. parquet        - ~100-5000ms (analytical queries)
#
# Version: 1.0.0
# Date: 2025-12-05
# Author: Phase 3 Agent 5

routing_rules:
  # Name resolution queries (drug/gene/pathway lookup by ID or name)
  # Route to: Tier 1 (master tables) via Rust primitives
  name_resolution:
    primary_tier: master_tables
    fallback_tiers:
      - pgvector
      - neo4j
    estimated_latency_ms: 0.5
    use_rust: true
    description: "Resolve entity names/IDs using indexed master tables"
    examples:
      - "resolve_drug('CHEMBL113')"
      - "resolve_gene('TP53')"
      - "resolve_pathway('Glycolysis')"

  # ID mapping queries (convert between ID systems)
  # Route to: Tier 1 (master tables)
  id_mapping:
    primary_tier: master_tables
    fallback_tiers:
      - pgvector
    estimated_latency_ms: 0.5
    use_rust: true
    description: "Map between ID systems (CHEMBL↔DrugBank, Entrez↔Ensembl)"
    examples:
      - "resolve_drugbank_to_lincs('DB00997')"
      - "resolve_gene_by_entrez('7157')"

  # Metadata lookup queries (detailed entity information)
  # Route to: Tier 1 (master tables)
  metadata_lookup:
    primary_tier: master_tables
    fallback_tiers:
      - neo4j
    estimated_latency_ms: 1.0
    use_rust: true
    description: "Retrieve entity metadata (MoA, chromosome, gene count, etc.)"
    examples:
      - "get_drug_metadata('CHEMBL113')"
      - "get_gene_metadata('TP53')"

  # Embedding similarity queries (cosine similarity between embeddings)
  # Route to: Tier 2 (PGVector)
  embedding_similarity:
    primary_tier: pgvector
    fallback_tiers: []
    estimated_latency_ms: 20.0
    use_rust: false
    description: "Calculate embedding similarity between two entities"
    examples:
      - "get_embedding_similarity('CHEMBL113', 'CHEMBL1234', 'drug')"
      - "calculate_gene_similarity('TP53', 'MDM2')"

  # Vector neighbors queries (k-NN in embedding space)
  # Route to: Tier 2 (PGVector)
  vector_neighbors:
    primary_tier: pgvector
    fallback_tiers: []
    estimated_latency_ms: 30.0
    use_rust: false
    description: "Find k nearest neighbors in embedding space"
    examples:
      - "get_vector_neighbors('TP53', 'gene', top_k=20)"
      - "find_similar_drugs('CHEMBL113', top_k=50)"

  # Graph traversal queries (multi-hop relationships)
  # Route to: Tier 3 (Neo4j)
  graph_traversal:
    primary_tier: neo4j
    fallback_tiers: []
    estimated_latency_ms: 100.0
    use_rust: false
    description: "Traverse graph relationships (neighbors, subgraphs)"
    examples:
      - "get_graph_neighbors('TP53', max_depth=2)"
      - "extract_subgraph(['TP53', 'MDM2', 'CHEMBL113'])"

  # Graph path queries (find paths between entities)
  # Route to: Tier 3 (Neo4j)
  graph_path:
    primary_tier: neo4j
    fallback_tiers: []
    estimated_latency_ms: 200.0
    use_rust: false
    description: "Find paths connecting entities in graph"
    examples:
      - "find_paths('TP53', 'CHEMBL113', max_hops=3)"
      - "shortest_path('TSC2', 'Rapamycin')"

  # Analytical queries (aggregations, full table scans)
  # Route to: Tier 4 (Parquet)
  analytical:
    primary_tier: parquet
    fallback_tiers:
      - pgvector
    estimated_latency_ms: 1000.0
    use_rust: false
    description: "Analytical queries requiring full dataset scans"
    examples:
      - "aggregate_gene_expression(disease='TSC')"
      - "statistical_summary(embedding_space='gene_modex')"

  # Bulk export queries (large data exports)
  # Route to: Tier 4 (Parquet)
  bulk_export:
    primary_tier: parquet
    fallback_tiers: []
    estimated_latency_ms: 5000.0
    use_rust: false
    description: "Export large datasets to files"
    examples:
      - "export_all_embeddings('gene_modex_v6_0')"
      - "export_fusion_table('g_g_1__ens__lincs')"

# Cache configuration
cache:
  max_size: 10000
  ttl_seconds: 3600
  enable_lru: true
  warm_cache_on_startup: false

# Monitoring configuration
monitoring:
  log_slow_queries: true
  slow_query_threshold_ms: 100.0
  emit_metrics: true
  metrics_export_interval_seconds: 300
  dashboard_enabled: true

# Performance targets
performance_targets:
  # Goal: 90% of name resolution queries use Tier 1
  name_resolution_tier1_percent: 90

  # Goal: 30% reduction in PGVector load
  pgvector_load_reduction_percent: 30

  # Goal: Zero Neo4j queries for simple lookups
  neo4j_simple_lookup_percent: 0

  # Goal: Sub-millisecond cached queries
  cached_query_p95_ms: 1.0

# Tier-specific configuration
tiers:
  master_tables:
    description: "Fastest tier using indexed PostgreSQL master tables"
    connection_pool_size: 10
    query_timeout_ms: 5000
    tables:
      - drug_master_v1_0
      - gene_master_v1_0
      - pathway_master_v1_0
      - drug_name_mappings_v1_0
      - gene_name_mappings_v1_0
      - pathway_genes_v1_0
      - drug_doses_v1_0

  pgvector:
    description: "Fast tier for embedding operations"
    connection_pool_size: 5
    query_timeout_ms: 30000
    tables:
      - ens_gene_64d_v6_0
      - drug_chemical_v6_0_256d
      - g_g_1__ens__lincs
      - gene_modex_v6_0_embeddings
      - g_aux_ens_64d_topk
      - d_aux_chemical_256d_topk

  neo4j:
    description: "Moderate tier for graph operations"
    connection_pool_size: 3
    query_timeout_ms: 60000
    max_hops: 3
    max_results: 1000

  parquet:
    description: "Slow tier for analytical queries"
    compression: snappy
    query_timeout_ms: 300000
    max_file_size_gb: 10

# Automatic fallback rules
fallback:
  enable_automatic_fallback: true
  max_fallback_attempts: 2
  fallback_on_timeout: true
  fallback_on_error: true
  log_fallback_events: true

# Rust primitives configuration
rust_primitives:
  enable: true
  prefer_rust_for_master_tables: true
  connection_pool_size: 10
  expected_speedup: 10.0
  description: "Use Rust primitives for 10x+ speedup on master table queries"
