name: BBB Prediction Service Enhancement Swarm
version: 1.0.0
date: 2025-12-01
description: |
  Complete short-term improvements for BBB Prediction Service.

  Completed:
  - Item #1: Comprehensive test suite (23 tests, 100% passing)
  - Item #2: Morgan fingerprint caching (10-50x speedup)

  Remaining (this swarm):
  - Item #3: Enhance QSAR fallback with ML model (z05_models)
  - Item #4: Expand BBB dataset with more compounds (z07_data_access)
  - Item #5: Create MCP tool for BBB prediction (tools/)
  - Item #6: Add parallel batch processing (z07_data_access)

zone_architecture:
  z05_models: Machine learning models (QSAR ML model)
  z07_data_access: Data management (BBB service, dataset expansion)
  z08_integration: External integrations (future MCP integration)
  tools: MCP tools for Claude integration

phases:
  - phase: 1
    name: "ML Model Development (z05_models)"
    description: "Build QSAR ML model for BBB prediction fallback"
    agents:
      - agent_1_qsar_ml_model
    parallelization: serial

  - phase: 2
    name: "Data Expansion (z07_data_access)"
    description: "Expand BBB dataset from 6,497 to 10,000+ compounds"
    agents:
      - agent_2_dataset_expansion
    parallelization: serial

  - phase: 3
    name: "Performance & Integration (z07 + tools)"
    description: "Parallel batch processing and MCP tool"
    agents:
      - agent_3_parallel_batch
      - agent_4_mcp_tool
    parallelization: parallel

  - phase: 4
    name: "Integration & Testing"
    description: "Integrate ML model with BBB service and test end-to-end"
    agents:
      - agent_5_integration
    parallelization: serial

agents:
  # ============================================================================
  # PHASE 1: ML Model Development (z05_models)
  # ============================================================================

  - id: agent_1_qsar_ml_model
    name: "QSAR ML Model Developer"
    phase: 1
    zone: z05_models
    description: |
      Build ML-based QSAR model for BBB prediction fallback.

      Current QSAR: Simple rules (Log BB ≈ -0.1×TPSA + 0.5×LogP - 0.01×MW)
      Target: ML model trained on BBB dataset (80%+ accuracy)

    tasks:
      - task: "Create z05_models/bbb_qsar_model.py"
        description: |
          Implement BBBQSARModel class:
          - Train random forest/gradient boosting on BBB dataset
          - Features: MW, LogP, TPSA, HBD, HBA, rotatable bonds, aromatic rings
          - Target: Log BB (regression) + BBB class (classification)
          - Train/test split: 80/20
          - Cross-validation: 5-fold
          - Save trained model to z05_models/artifacts/bbb_qsar_v1_0.pkl

      - task: "Create z05_models/tests/test_bbb_qsar_model.py"
        description: |
          Test suite for QSAR ML model:
          - Model initialization and loading
          - Feature extraction from SMILES
          - Prediction accuracy (>75% on test set)
          - Regression metrics (MAE, RMSE, R²)
          - Classification metrics (precision, recall, F1)
          - Comparison with simple QSAR rules

      - task: "Train model on BBB dataset"
        description: |
          Training pipeline:
          1. Load /data/bbb/chembl_bbb_data.csv (6,497 compounds)
          2. Extract molecular features using RDKit
          3. Train random forest regressor (Log BB)
          4. Train random forest classifier (BBB class)
          5. Evaluate on test set
          6. Save model artifacts and metrics

      - task: "Create model documentation"
        description: |
          Document model performance and usage:
          - Feature importance analysis
          - Performance metrics vs simple QSAR
          - Usage examples
          - Integration guide for z07_data_access

    dependencies: []

    deliverables:
      - z05_models/bbb_qsar_model.py (ML model implementation)
      - z05_models/artifacts/bbb_qsar_v1_0.pkl (trained model)
      - z05_models/tests/test_bbb_qsar_model.py (test suite)
      - z05_models/BBB_QSAR_ML_MODEL_REPORT.md (documentation)

    success_criteria:
      - Model accuracy >75% on test set (vs 60-70% for simple QSAR)
      - MAE <0.3 for Log BB regression
      - All tests passing (20+ tests)
      - Integration-ready with clear API

    estimated_time: 2-3 hours

  # ============================================================================
  # PHASE 2: Data Expansion (z07_data_access)
  # ============================================================================

  - id: agent_2_dataset_expansion
    name: "BBB Dataset Expander"
    phase: 2
    zone: z07_data_access
    description: |
      Expand BBB dataset from 6,497 to 10,000+ compounds.

      Current: 6,497 compounds (36 literature, 6,461 QSAR)
      Target: 10,000+ compounds (100+ literature, 9,900+ QSAR)

    tasks:
      - task: "Mine literature BBB data"
        description: |
          Expand literature-validated compounds:
          - Query ChEMBL for additional BBB permeability data
          - Search PubChem BioAssay for BBB assays
          - Extract compounds from BBB literature reviews
          - Validate SMILES and Log BB values
          - Target: 100+ literature-validated compounds

      - task: "Generate QSAR predictions for ChEMBL drugs"
        description: |
          Expand QSAR-predicted compounds:
          - Load ChEMBL drugs (filter CNS/neurological drugs)
          - Apply new ML QSAR model (from agent_1)
          - Generate Log BB predictions
          - Classify as BBB+/BBB-/uncertain
          - Target: 3,500+ new QSAR predictions

      - task: "Validate and merge datasets"
        description: |
          Quality assurance:
          - Remove duplicates (canonical SMILES matching)
          - Validate all SMILES with RDKit
          - Check Log BB range (-5.0 to 2.0)
          - Verify BBB class consistency
          - Create unified dataset

      - task: "Update BBB dataset file"
        description: |
          Save expanded dataset:
          - Path: /data/bbb/chembl_bbb_data_v2_0.csv
          - Columns: chembl_id, smiles, log_bb, bbb_class, data_source, confidence
          - Add metadata: version, creation date, source info
          - Update BBBPredictionService to use new dataset

    dependencies:
      - agent_1_qsar_ml_model (for ML predictions)

    deliverables:
      - /data/bbb/chembl_bbb_data_v2_0.csv (10,000+ compounds)
      - z07_data_access/scripts/expand_bbb_dataset.py (expansion script)
      - z07_data_access/BBB_DATASET_EXPANSION_REPORT.md (documentation)

    success_criteria:
      - Total compounds: 10,000+
      - Literature-validated: 100+
      - All SMILES valid (100%)
      - BBB class distribution balanced (30-40% each for BBB+/BBB-)
      - Updated BBBPredictionService uses new dataset

    estimated_time: 2-3 hours

  # ============================================================================
  # PHASE 3: Performance & Integration (z07 + tools)
  # ============================================================================

  - id: agent_3_parallel_batch
    name: "Parallel Batch Processing Developer"
    phase: 3
    zone: z07_data_access
    description: |
      Add parallel batch processing for BBB predictions.

      Current: Sequential batch processing (~1-2s per drug)
      Target: Parallel processing with multiprocessing/threading (5-10x speedup)

    tasks:
      - task: "Implement parallel batch prediction"
        description: |
          Add to BBBPredictionService:
          - Method: batch_predict_parallel(drugs, k_neighbors=10, n_workers=4)
          - Use multiprocessing.Pool for CPU-bound fingerprint generation
          - Use ThreadPoolExecutor for I/O-bound database queries
          - Batch size optimization (default: 100 drugs per worker)
          - Progress tracking with tqdm
          - Error handling for individual drug failures

      - task: "Add batch fingerprint generation"
        description: |
          Optimize fingerprint generation:
          - Method: _batch_generate_fingerprints(smiles_list)
          - Vectorized operations where possible
          - Parallel fingerprint generation
          - Cache results for repeated queries

      - task: "Create performance benchmarks"
        description: |
          Benchmark parallel vs sequential:
          - Test with 100, 500, 1000 drug batches
          - Measure latency and throughput
          - Compare CPU utilization
          - Document speedup factor

      - task: "Add tests for parallel processing"
        description: |
          Test suite additions:
          - test_parallel_batch_prediction()
          - test_batch_fingerprint_generation()
          - test_parallel_error_handling()
          - test_parallel_performance_benchmark()

    dependencies:
      - agent_2_dataset_expansion (for larger dataset testing)

    deliverables:
      - Updated z07_data_access/bbb_prediction_service.py (parallel methods)
      - Updated tests/test_bbb_prediction_service.py (parallel tests)
      - z07_data_access/PARALLEL_BATCH_PERFORMANCE_REPORT.md

    success_criteria:
      - 5-10x speedup for batch predictions (>100 drugs)
      - All tests passing (including parallel tests)
      - Error handling robust (partial failures don't stop batch)
      - CPU utilization >80% during batch processing

    estimated_time: 1-2 hours

  - id: agent_4_mcp_tool
    name: "MCP Tool Developer"
    phase: 3
    zone: tools
    description: |
      Create MCP tool for BBB prediction to enable Claude integration.

      Purpose: Allow Claude to predict BBB permeability for drug candidates

    tasks:
      - task: "Create tools/bbb_prediction.py MCP tool"
        description: |
          MCP tool implementation:
          - Tool name: "predict_bbb_permeability"
          - Inputs: drug_name (optional), smiles (optional), k_neighbors (default: 10)
          - Outputs: predicted_log_bb, predicted_bbb_class, confidence, method, neighbors
          - Integration: Uses get_bbb_prediction_service() from z07_data_access
          - Error handling: Invalid SMILES, drug not found, etc.
          - Response format: JSON with full BBBPrediction object

      - task: "Add MCP tool metadata"
        description: |
          Tool configuration:
          - Description: "Predict Blood-Brain Barrier permeability for drugs"
          - Parameters: drug_name (str), smiles (str), k_neighbors (int)
          - Examples: Caffeine, Fenfluramine, custom SMILES
          - Usage notes: Chemical similarity vs QSAR fallback

      - task: "Create MCP tool tests"
        description: |
          Test suite:
          - test_mcp_bbb_prediction_by_name()
          - test_mcp_bbb_prediction_by_smiles()
          - test_mcp_bbb_prediction_invalid_input()
          - test_mcp_bbb_prediction_batch()

      - task: "Document MCP tool usage"
        description: |
          Usage guide:
          - Installation instructions
          - Example prompts for Claude
          - Response interpretation
          - Integration with drug discovery workflows

    dependencies: []

    deliverables:
      - tools/bbb_prediction.py (MCP tool)
      - tools/tests/test_bbb_prediction_mcp.py (test suite)
      - tools/BBB_PREDICTION_MCP_TOOL_GUIDE.md (documentation)

    success_criteria:
      - MCP tool functional with Claude
      - All tests passing (10+ tests)
      - Clear documentation with examples
      - Response time <500ms for single predictions

    estimated_time: 1-2 hours

  # ============================================================================
  # PHASE 4: Integration & Testing
  # ============================================================================

  - id: agent_5_integration
    name: "BBB Service Integration & Testing"
    phase: 4
    zone: z07_data_access
    description: |
      Integrate ML QSAR model with BBBPredictionService and test end-to-end.

    tasks:
      - task: "Integrate ML QSAR model"
        description: |
          Update BBBPredictionService._qsar_fallback():
          - Import BBBQSARModel from z05_models
          - Load trained model (bbb_qsar_v1_0.pkl)
          - Use ML model for predictions instead of simple rules
          - Fallback to simple rules if ML model fails
          - Update confidence scores (0.75 for ML vs 0.3 for rules)

      - task: "Update service initialization"
        description: |
          Add ML model loading:
          - Optional parameter: use_ml_qsar=True
          - Load model during __init__
          - Cache model in memory
          - Add model statistics to get_stats()

      - task: "End-to-end testing"
        description: |
          Comprehensive integration tests:
          - Test ML QSAR predictions vs simple rules
          - Test with expanded dataset (10,000+ compounds)
          - Test parallel batch processing (1000 drugs)
          - Test MCP tool integration
          - Performance benchmarks with all features enabled

      - task: "Create final summary report"
        description: |
          Document all improvements:
          - Feature comparison (before/after)
          - Performance metrics (latency, accuracy, throughput)
          - Dataset statistics (6,497 → 10,000+)
          - Integration guide
          - Future roadmap

    dependencies:
      - agent_1_qsar_ml_model
      - agent_2_dataset_expansion
      - agent_3_parallel_batch
      - agent_4_mcp_tool

    deliverables:
      - Updated z07_data_access/bbb_prediction_service.py (ML integration)
      - Updated tests/test_bbb_prediction_service.py (integration tests)
      - z07_data_access/BBB_SERVICE_ENHANCEMENT_COMPLETE.md (final report)

    success_criteria:
      - All tests passing (40+ tests total)
      - ML QSAR accuracy >75% (vs 60-70% for simple rules)
      - End-to-end latency <100ms (with all features)
      - Complete documentation and examples

    estimated_time: 1-2 hours

execution:
  mode: parallel_by_phase
  estimated_total_time: 7-12 hours agent-time → 3-5 hours wall-time

  execution_order:
    - Phase 1: agent_1_qsar_ml_model (serial, 2-3 hours)
    - Phase 2: agent_2_dataset_expansion (serial, 2-3 hours)
    - Phase 3: agent_3_parallel_batch + agent_4_mcp_tool (parallel, 1-2 hours)
    - Phase 4: agent_5_integration (serial, 1-2 hours)

  total_agents: 5
  max_concurrent: 2 (Phase 3)

success_metrics:
  - All 5 agents complete successfully
  - Total tests: 40+ (currently 23, adding ~17 new)
  - Test pass rate: 100%
  - ML QSAR accuracy: >75%
  - Dataset size: 10,000+ compounds
  - Batch processing speedup: 5-10x
  - MCP tool functional
  - Documentation complete

deliverables_summary:
  zone_z05_models:
    - bbb_qsar_model.py (ML QSAR model)
    - artifacts/bbb_qsar_v1_0.pkl (trained model)
    - tests/test_bbb_qsar_model.py (test suite)
    - BBB_QSAR_ML_MODEL_REPORT.md (documentation)

  zone_z07_data_access:
    - bbb_prediction_service.py (updated with ML, parallel processing)
    - tests/test_bbb_prediction_service.py (40+ tests)
    - scripts/expand_bbb_dataset.py (dataset expansion script)
    - BBB_DATASET_EXPANSION_REPORT.md (dataset docs)
    - PARALLEL_BATCH_PERFORMANCE_REPORT.md (performance docs)
    - BBB_SERVICE_ENHANCEMENT_COMPLETE.md (final summary)

  data:
    - /data/bbb/chembl_bbb_data_v2_0.csv (10,000+ compounds)

  tools:
    - bbb_prediction.py (MCP tool)
    - tests/test_bbb_prediction_mcp.py (MCP tests)
    - BBB_PREDICTION_MCP_TOOL_GUIDE.md (MCP docs)

notes:
  - Follow zone architecture strictly
  - ML models in z05_models (not z07_data_access)
  - Data management in z07_data_access
  - MCP tools in tools/ directory
  - Use existing resolvers from meta_layer
  - Maintain backward compatibility
  - All tests must pass before integration
  - Document all zone dependencies clearly
