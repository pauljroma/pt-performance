<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 200" width="700" height="400">
  <!-- Business Card Template - 3.5" x 2" at 2x -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d4f4f"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect width="350" height="200" fill="white"/>

  <!-- Accent Bar -->
  <rect x="0" y="0" width="8" height="200" fill="url(#cardGrad)"/>

  <!-- Logo Mark -->
  <svg x="25" y="25" viewBox="0 0 50 50" width="50" height="50">
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#0d4f4f"/>
        <stop offset="100%" style="stop-color:#14b8a6"/>
      </linearGradient>
    </defs>
    <rect width="50" height="50" rx="10" fill="url(#logoGrad)"/>
    <path d="M12.5 35 L12.5 20 L25 30 L37.5 14 L37.5 35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="37.5" cy="14" r="2.5" fill="white"/>
  </svg>

  <!-- Name -->
  <text x="25" y="105" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#0d4f4f">[Your Name]</text>

  <!-- Title -->
  <text x="25" y="125" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748b">[Your Title]</text>

  <!-- Contact Info -->
  <text x="25" y="155" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#475569">[email]@getmodus.app</text>
  <text x="25" y="172" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0891b2">getmodus.app</text>

  <!-- Wordmark -->
  <text x="290" y="180" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#0d4f4f">modus</text>

  <!-- Tagline (subtle) -->
  <text x="192" y="30" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#94a3b8" font-style="italic">Stop Guessing. Start Recovering.</text>
</svg>
