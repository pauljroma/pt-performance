# Sand-Expo Unified Docker Compose
# All 29 containers with preserved configurations
# Created: 2026-01-05

services:
  # ============================================================
  # CORE DATABASES
  # ============================================================

  db:
    image: postgres:15-alpine
    container_name: sand-expo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: temppass123
      POSTGRES_DB: expo
      POSTGRES_SHARED_BUFFERS: 8GB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 24GB
      POSTGRES_WORK_MEM: 128MB
      POSTGRES_MAINTENANCE_WORK_MEM: 2GB
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_MAX_WORKER_PROCESSES: 16
      POSTGRES_MAX_PARALLEL_WORKERS: 16
      POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER: 4
    ports:
      - "5432:5432"
    volumes:
      - expo_expo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: sand-expo-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: temp
    ports:
      - "5435:5432"
    volumes:
      - expo_pgvector_data:/var/lib/postgresql/data
    command: ["-c", "max_connections=500", "-c", "shared_buffers=512MB", "-c", "max_wal_size=2GB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.14-community
    container_name: sand-expo-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/testpassword123
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 4G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - expo_expo_neo4j_data:/data
      - expo_expo_neo4j_logs:/logs
      - expo_expo_neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p testpassword123 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  omop-twin-postgres:
    image: pgvector/pgvector:pg16
    container_name: sand-expo-omop-twin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: temp
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - omop_twin_pgdata:/var/lib/postgresql/data

  omop-twin-neo4j:
    image: neo4j:5.14-community
    container_name: sand-expo-omop-twin-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/testpassword123
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7476:7474"
      - "7689:7687"
    volumes:
      - omop_twin_neo4j_data:/data
      - omop_twin_neo4j_logs:/logs
      - omop_twin_neo4j_import:/var/lib/neo4j/import

  # ============================================================
  # MESSAGING & CACHE
  # ============================================================

  redis:
    image: redis:7-alpine
    container_name: sand-expo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - expo_expo_redis_data:/data
    command: >
      redis-server
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --io-threads 4
      --io-threads-do-reads yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    container_name: sand-expo-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - expo_expo_nats_data:/data
    command: ["-js", "-m", "8222", "-sd", "/data"]

  # ============================================================
  # CHROMADB INSTANCES
  # ============================================================

  chromadb:
    image: chromadb/chroma:latest
    container_name: sand-expo-chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_CORS_ALLOW_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    volumes:
      - expo_expo_chromadb_data:/chroma/chroma

  ai-context-chroma:
    image: chromadb/chroma:latest
    container_name: sand-expo-ai-context-chroma
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_CORS_ALLOW_ORIGINS: '["*"]'
    ports:
      - "8003:8000"
    volumes:
      - expo_ai_conversations_chromadb_data:/data

  literature-chromadb:
    image: chromadb/chroma:latest
    container_name: sand-expo-literature-chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_CORS_ALLOW_ORIGINS: '["*"]'
    ports:
      - "8004:8000"
    volumes:
      - expo_literature_chromadb_data:/data

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  n8n:
    image: n8nio/n8n:latest
    container_name: sand-expo-n8n
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
      GENERIC_TIMEZONE: America/Los_Angeles
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: "jGvI0ZWcQZ*BVvl]4s>hy{dm"
      N8N_SECURE_COOKIE: "false"
      N8N_PAYLOAD_SIZE_MAX: 128
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_API_KEY_AUTH_ENABLED: "true"
      N8N_USER_FOLDER: /home/node/.n8n
      N8N_CUSTOM_EXTENSIONS: /home/node/.n8n/custom
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_DB: 1
      EXPO_HOME: /Users/expo/Code/expo
    ports:
      - "5678:5678"
    volumes:
      - expo_expo_n8n_data:/home/node/.n8n
      - /Users/expo/Code/expo:/Users/expo/Code/expo
      - /Users/expo/Code/expo/.backup_metrics:/Users/expo/Code/expo/.backup_metrics
      - /Users/expo/Code/expo/backups:/Users/expo/Code/expo/backups
      - /Users/expo/Code/expo/logs:/Users/expo/Code/expo/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis

  literature-api:
    image: sand-expo-literature-api:1.0.0
    container_name: sand-expo-literature-api
    restart: unless-stopped
    environment:
      CHROMADB_HOST: literature-chromadb
      CHROMADB_PORT: 8000
    ports:
      - "8765:8765"
    depends_on:
      - literature-chromadb

  biomarker-discovery-agent:
    image: sand-expo-biomarker-discovery-agent:latest
    container_name: sand-expo-biomarker-discovery-agent
    restart: unless-stopped
    ports:
      - "8100:8100"
      - "9213:9213"

  literature-search-agent:
    image: sand-expo-literature-search-agent:latest
    container_name: sand-expo-literature-search-agent
    restart: unless-stopped
    ports:
      - "8101:8101"
      - "9211:9211"

  # ============================================================
  # MONITORING - INFRASTRUCTURE EXPORTERS
  # ============================================================

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: sand-expo-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true

  node-exporter:
    image: prom/node-exporter:latest
    container_name: sand-expo-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  promtail:
    image: grafana/promtail:2.9.3
    container_name: sand-expo-promtail
    restart: unless-stopped
    volumes:
      - /Users/expo/Code/expo/shared/monitoring/promtail:/etc/promtail:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /Users/expo/Code/expo/logs:/Users/expo/Code/expo/logs:ro
    command: -config.file=/etc/promtail/config.yml

  # ============================================================
  # MONITORING - DATABASE EXPORTERS
  # ============================================================

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sand-expo-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:temppass123@db:5432/expo?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - db

  pgvector-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sand-expo-pgvector-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:temp@pgvector:5432/postgres?sslmode=disable"
    ports:
      - "9188:9187"
    depends_on:
      - pgvector

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: sand-expo-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis

  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    container_name: sand-expo-nats-exporter
    restart: unless-stopped
    ports:
      - "7777:7777"
    command: ["-varz", "http://nats:8222"]
    depends_on:
      - nats

  # ============================================================
  # MONITORING - CUSTOM EXPORTERS
  # ============================================================

  backup-api-server:
    image: sand-expo-backup-api-server:1.0.0
    container_name: sand-expo-backup-api-server
    restart: unless-stopped
    ports:
      - "8766:8766"
    volumes:
      - /Users/expo/Code/expo/.backup_metrics:/app/.backup_metrics:rw
      - /Users/expo/Code/expo/scripts/backup:/app/scripts/backup:ro

  backup-metrics-exporter:
    image: sand-expo-backup-metrics-exporter:1.0.0
    container_name: sand-expo-backup-metrics-exporter
    restart: unless-stopped
    ports:
      - "9208:9208"
    volumes:
      - /Users/expo/Code/expo/.backup_metrics:/metrics:ro

  n8n-metrics-exporter:
    image: sand-expo-n8n-metrics-exporter:1.0.0
    container_name: sand-expo-n8n-metrics-exporter
    restart: unless-stopped
    ports:
      - "9202:9202"

  server-health-exporter:
    image: sand-expo-server-health-exporter:1.0.0
    container_name: sand-expo-server-health-exporter
    restart: unless-stopped
    ports:
      - "9204:9204"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  sapphire-metrics-exporter:
    image: sand-expo-sapphire-metrics-exporter:1.0.0
    container_name: sand-expo-sapphire-metrics-exporter
    restart: unless-stopped
    ports:
      - "9212:9212"

  x5studio-swarm-exporter:
    image: sand-expo-x5studio-swarm-exporter:1.0.0
    container_name: sand-expo-x5studio-swarm-exporter
    restart: unless-stopped
    ports:
      - "9210:9210"
    volumes:
      - /Users/expo/Code/expo/.workspace:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9210/metrics').read()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  component-registry-exporter:
    image: sand-expo-component-registry-exporter:1.0.0
    container_name: sand-expo-component-registry-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"
    volumes:
      - /Users/expo/Code/expo/.outcomes/component_registry_cache.json:/zones/z10a/src/registry.json:ro

  agent-service-bus-exporter:
    image: sand-expo-agent-service-bus-exporter:1.0.0
    container_name: sand-expo-agent-service-bus-exporter
    restart: unless-stopped
    ports:
      - "9206:9206"

# ============================================================
# VOLUMES - All external to preserve existing data
# ============================================================

volumes:
  # Core databases
  expo_expo_pgdata:
    external: true
  expo_pgvector_data:
    external: true
  expo_expo_neo4j_data:
    external: true
  expo_expo_neo4j_logs:
    external: true
  expo_expo_neo4j_import:
    external: true

  # OMOP Twin
  omop_twin_pgdata:
    external: true
  omop_twin_neo4j_data:
    external: true
  omop_twin_neo4j_logs:
    external: true
  omop_twin_neo4j_import:
    external: true

  # Messaging & Cache
  expo_expo_redis_data:
    external: true
  expo_expo_nats_data:
    external: true

  # ChromaDB
  expo_expo_chromadb_data:
    external: true
  expo_ai_conversations_chromadb_data:
    external: true
  expo_literature_chromadb_data:
    external: true

  # Applications
  expo_expo_n8n_data:
    external: true

# ============================================================
# NETWORKS
# ============================================================

networks:
  default:
    name: sand-expo-network
    driver: bridge
